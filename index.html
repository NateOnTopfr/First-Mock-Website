<!DOCTYPE html>
<html>
  <head>
    <title>My First Webpage</title>
    <link href="style.css" rel="stylesheet">
  </head>
  <header>
    <h1>My First Test Webpage</h1>
  </header>
  <body>
    <h1>JokerObfuscator Review Page</h1>
    <form action="./suggestions.html" method="POST">
       <label for="suggestions">Any extra features you want us to add?</label>
        <br>
        <textarea id="suggestions" name="suggestions" rows="3" cols="40" minlength="10" maxlength="250"></textarea>
        <br>
        <label for="rating">Rate our service 1-5!</label>
        <input type="range" min="1" max="5" step=".5" name="rating" id="rating">
        <br>
        <input type="submit">
    </form>
  </body>
  </html>
